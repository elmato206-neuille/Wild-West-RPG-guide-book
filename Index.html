<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colter Territory — World Bible</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1208;
  --sepia: #8b6914;
  --sepia-light: #c9a84c;
  --paper: #f5ead2;
  --paper-dark: #e8d5b0;
  --paper-darker: #d4bc8a;
  --red: #8b1a1a;
  --fade: #6b5a3e;
  --shadow: rgba(26,18,8,0.25);
  --bg: #2a1f0e;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  background-image: radial-gradient(ellipse at 20% 20%, #3d2b0f 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, #1a0f05 0%, transparent 60%);
  min-height: 100vh;
  font-family: 'Crimson Text', serif;
  color: var(--ink);
}

/* ── HEADER ── */
.header {
  background: var(--ink);
  border-bottom: 3px solid var(--sepia);
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
}
.header-inner {
  max-width: 1400px; margin: 0 auto;
  padding: 14px 24px;
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
}
.logo { display:flex; flex-direction:column; line-height:1; }
.logo-title { font-family:'Special Elite',cursive; font-size:1.35rem; color:var(--sepia-light); letter-spacing:.12em; text-transform:uppercase; }
.logo-sub { font-family:'Crimson Text',serif; font-size:.72rem; color:var(--fade); letter-spacing:.2em; text-transform:uppercase; margin-top:2px; }
.divider-v { width:1px; height:38px; background:var(--sepia); opacity:.35; }

/* NAV TABS */
.nav-tabs { display:flex; gap:4px; }
.nav-tab {
  padding: 7px 16px;
  background: transparent;
  border: 1px solid rgba(139,105,20,0.3);
  border-radius: 1px;
  color: var(--fade);
  font-family: 'Special Elite', cursive;
  font-size: .78rem;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.nav-tab:hover { border-color:var(--sepia-light); color:var(--sepia-light); }
.nav-tab.active { background:var(--sepia); border-color:var(--sepia); color:var(--ink); }

/* Search (header) */
.search-wrap { flex:1; min-width:180px; position:relative; }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--sepia); pointer-events:none; }
#search {
  width:100%; padding:9px 14px 9px 36px;
  background:#2e2010; border:1px solid var(--sepia); border-radius:2px;
  color:var(--paper); font-family:'Special Elite',cursive; font-size:.88rem;
  letter-spacing:.05em; outline:none; transition:border-color .2s, box-shadow .2s;
}
#search::placeholder { color:#6b5a3e; }
#search:focus { border-color:var(--sepia-light); box-shadow:0 0 0 2px rgba(201,168,76,.15); }
.result-count { font-family:'Crimson Text',serif; color:var(--fade); font-size:.82rem; white-space:nowrap; font-style:italic; }

/* ── CATEGORY FILTERS ── */
.filters { background:#221608; border-bottom:1px solid rgba(139,105,20,.3); padding:9px 24px; overflow-x:auto; scrollbar-width:none; }
.filters::-webkit-scrollbar { display:none; }
.filters-inner { max-width:1400px; margin:0 auto; display:flex; gap:7px; align-items:center; min-width:max-content; }
.filter-label { font-family:'Crimson Text',serif; color:var(--fade); font-size:.78rem; text-transform:uppercase; letter-spacing:.15em; margin-right:4px; }
.filter-btn { padding:4px 11px; background:transparent; border:1px solid rgba(139,105,20,.4); border-radius:1px; color:var(--fade); font-family:'Crimson Text',serif; font-size:.78rem; cursor:pointer; transition:all .2s; white-space:nowrap; letter-spacing:.05em; }
.filter-btn:hover { border-color:var(--sepia-light); color:var(--sepia-light); }
.filter-btn.active { background:var(--sepia); border-color:var(--sepia); color:var(--ink); font-weight:600; }

/* ── VIEWS ── */
.view { display:none; }
.view.active { display:block; }

/* ── ENTRIES VIEW ── */
.main { max-width:1400px; margin:0 auto; padding:28px 24px; }
.ornament { text-align:center; color:var(--sepia); font-size:1.3rem; margin-bottom:22px; opacity:.6; letter-spacing:.5em; }
.entries-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:18px; }

/* ── ENTRY CARD ── */
.entry-card {
  background:var(--paper);
  border:1px solid var(--paper-darker); border-radius:1px;
  overflow:hidden; cursor:pointer;
  transition:transform .2s, box-shadow .2s;
  position:relative;
  box-shadow:0 2px 8px var(--shadow), inset 0 0 0 1px rgba(255,255,255,.3);
}
.entry-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--category-color,var(--sepia)); }
.entry-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px var(--shadow), inset 0 0 0 1px rgba(255,255,255,.3); }
.card-header { padding:15px 17px 11px; border-bottom:1px solid var(--paper-darker); background:rgba(0,0,0,.02); }
.card-category { font-family:'Crimson Text',serif; font-size:.68rem; text-transform:uppercase; letter-spacing:.2em; color:var(--category-color,var(--sepia)); margin-bottom:4px; font-weight:600; }
.card-title { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700; color:var(--ink); line-height:1.2; }
.card-aliases { margin-top:5px; display:flex; flex-wrap:wrap; gap:3px; }
.alias-tag { font-family:'Crimson Text',serif; font-size:.68rem; padding:1px 6px; background:var(--paper-dark); border:1px solid var(--paper-darker); border-radius:1px; color:var(--fade); font-style:italic; }
.card-body { padding:13px 17px 15px; }
.card-excerpt { font-size:.93rem; line-height:1.6; color:#3a2e1e; }
.card-excerpt .highlight { background:rgba(201,168,76,.3); border-radius:2px; padding:0 2px; }
.card-read-more { display:inline-block; margin-top:9px; font-family:'Special Elite',cursive; font-size:.7rem; letter-spacing:.1em; color:var(--sepia); text-transform:uppercase; border-bottom:1px dotted var(--sepia); }
.card-constant { position:absolute; top:11px; right:13px; font-size:.62rem; font-family:'Crimson Text',serif; color:var(--red); text-transform:uppercase; letter-spacing:.1em; font-weight:600; }

/* ── MAP VIEW ── */
.map-view { padding:24px; max-width:1400px; margin:0 auto; }

.map-controls {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:16px; flex-wrap:wrap; gap:12px;
}
.map-controls-left { display:flex; align-items:center; gap:16px; }
.map-title { font-family:'Playfair Display',serif; font-size:1.3rem; color:var(--sepia-light); font-style:italic; }
.map-subtitle { font-family:'Crimson Text',serif; font-size:.85rem; color:var(--fade); }

/* Toggle switch */
.toggle-wrap { display:flex; align-items:center; gap:10px; }
.toggle-label { font-family:'Special Elite',cursive; font-size:.75rem; color:var(--fade); letter-spacing:.08em; text-transform:uppercase; }
.toggle {
  position:relative; width:46px; height:24px; cursor:pointer;
}
.toggle input { opacity:0; width:0; height:0; }
.toggle-track {
  position:absolute; inset:0;
  background:#2e2010; border:1px solid var(--sepia);
  border-radius:12px; transition:.3s;
}
.toggle input:checked + .toggle-track { background:var(--sepia); }
.toggle-thumb {
  position:absolute; top:3px; left:3px;
  width:16px; height:16px; border-radius:50%;
  background:var(--fade); transition:.3s;
}
.toggle input:checked ~ .toggle-thumb { transform:translateX(22px); background:var(--ink); }

/* Map container */
.map-container {
  position:relative; display:inline-block;
  width:100%; max-width:1024px;
  border:2px solid var(--sepia);
  border-radius:2px;
  box-shadow:0 8px 40px rgba(0,0,0,.6), 0 0 0 1px rgba(201,168,76,.2);
  overflow:hidden;
}
.map-img { display:block; width:100%; height:auto; }

/* Hotspot dots */
.hotspot {
  position:absolute;
  transform:translate(-50%,-50%);
  cursor:pointer;
  z-index:10;
  transition:opacity .3s;
}
.hotspot-dot {
  width:14px; height:14px; border-radius:50%;
  background:rgba(201,168,76,.85);
  border:2px solid rgba(255,255,255,.9);
  box-shadow:0 0 0 2px rgba(139,105,20,.5), 0 2px 8px rgba(0,0,0,.5);
  transition:transform .2s, background .2s;
  position:relative;
}
.hotspot-dot::after {
  content:'';
  position:absolute;
  inset:-4px; border-radius:50%;
  border:1px solid rgba(201,168,76,.4);
  animation:pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity:.6; transform:scale(1); }
  50% { opacity:0; transform:scale(1.8); }
}
.hotspot:hover .hotspot-dot { transform:scale(1.4); background:rgba(255,220,80,1); }
.hotspot-label {
  position:absolute; bottom:calc(100% + 6px); left:50%;
  transform:translateX(-50%);
  background:rgba(26,18,8,.92);
  color:var(--sepia-light);
  font-family:'Special Elite',cursive;
  font-size:.62rem;
  letter-spacing:.06em;
  padding:3px 7px;
  border:1px solid var(--sepia);
  border-radius:1px;
  white-space:nowrap;
  opacity:0; pointer-events:none;
  transition:opacity .2s;
}
.hotspot:hover .hotspot-label { opacity:1; }

/* Interactive OFF state */
.map-container.no-interact .hotspot { opacity:0; pointer-events:none; }
.map-container.no-interact .hotspot-dot::after { animation:none; }

/* Map legend */
.map-legend {
  margin-top:14px;
  font-family:'Crimson Text',serif;
  font-size:.82rem;
  color:var(--fade);
  font-style:italic;
  text-align:center;
}
.map-legend span { color:var(--sepia-light); }

/* ── MODAL ── */
.modal-overlay {
  position:fixed; inset:0;
  background:rgba(10,6,2,.85);
  z-index:200;
  display:flex; align-items:center; justify-content:center; padding:20px;
  opacity:0; pointer-events:none; transition:opacity .3s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--paper);
  max-width:720px; width:100%; max-height:85vh;
  border-radius:2px; overflow:hidden;
  display:flex; flex-direction:column;
  box-shadow:0 32px 80px rgba(0,0,0,.7), 0 0 0 1px var(--paper-darker), inset 0 0 0 4px rgba(255,255,255,.15);
  transform:translateY(20px); transition:transform .3s; position:relative;
}
.modal-overlay.open .modal { transform:translateY(0); }
.modal-top-bar { height:4px; flex-shrink:0; }
.modal-header { padding:22px 26px 16px; border-bottom:1px solid var(--paper-darker); background:rgba(0,0,0,.03); flex-shrink:0; }
.modal-category { font-family:'Crimson Text',serif; font-size:.7rem; text-transform:uppercase; letter-spacing:.22em; font-weight:600; margin-bottom:5px; }
.modal-title { font-family:'Playfair Display',serif; font-size:1.85rem; font-weight:900; color:var(--ink); line-height:1.15; }
.modal-aliases { margin-top:9px; display:flex; flex-wrap:wrap; gap:5px; align-items:center; }
.modal-alias-label { font-family:'Crimson Text',serif; font-size:.73rem; color:var(--fade); text-transform:uppercase; letter-spacing:.12em; margin-right:2px; }
.modal-body { padding:22px 26px 26px; overflow-y:auto; flex:1; }
.modal-content { font-family:'Crimson Text',serif; font-size:1.08rem; line-height:1.8; color:#2a1f0e; }
.modal-content .highlight { background:rgba(201,168,76,.3); border-radius:2px; padding:0 2px; }
.entry-tags { margin-top:18px; padding:13px 15px; background:var(--paper-dark); border:1px solid var(--paper-darker); border-radius:1px; display:flex; flex-wrap:wrap; gap:7px; }
.entry-tag { font-family:'Special Elite',cursive; font-size:.68rem; padding:3px 8px; border:1px solid var(--sepia); border-radius:1px; color:var(--sepia); letter-spacing:.05em; }
.entry-tag strong { color:var(--ink); }
.modal-close { position:absolute; top:14px; right:14px; background:transparent; border:1px solid rgba(139,105,20,.4); color:var(--fade); width:30px; height:30px; border-radius:1px; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; transition:all .2s; z-index:10; }
.modal-close:hover { border-color:var(--sepia-light); color:var(--sepia-light); }
.modal-body::-webkit-scrollbar { width:5px; }
.modal-body::-webkit-scrollbar-track { background:var(--paper-dark); }
.modal-body::-webkit-scrollbar-thumb { background:var(--sepia); border-radius:3px; }

/* Empty */
.empty { grid-column:1/-1; text-align:center; padding:70px 20px; }
.empty-icon { font-size:2.8rem; margin-bottom:14px; opacity:.3; }
.empty-text { font-family:'Playfair Display',serif; font-size:1.35rem; color:var(--sepia-light); font-style:italic; }
.empty-sub { font-family:'Crimson Text',serif; color:var(--fade); margin-top:7px; font-size:.93rem; }

/* Category colors */
.cat-Character { --category-color:#7b3b3b; }
.cat-Faction { --category-color:#6b4423; }
.cat-Location { --category-color:#3b5a3b; }
.cat-Settlement { --category-color:#2e6b6b; }
.cat-Geography { --category-color:#4a5a2e; }
.cat-History { --category-color:#6b6b2e; }
.cat-Folklore { --category-color:#5a2e6b; }
.cat-Legend { --category-color:#4b2e7a; }
.cat-Lore { --category-color:#6b2e5a; }
.cat-Rule { --category-color:#7a2e2e; }
.cat-Occurrence { --category-color:#5a6b3b; }
.cat-Unexplained { --category-color:#3b4a6b; }
.cat-Technology { --category-color:#4a6b6b; }
.cat-Trade { --category-color:#6b5a3b; }
.cat-Industry { --category-color:#5a4a3b; }
.cat-Equipment { --category-color:#6b6b4a; }
.cat-Fauna { --category-color:#3b6b4a; }
.cat-Flora { --category-color:#3b6b3b; }
.cat-Landmark { --category-color:#5a6b2e; }
.cat-Outlaw-Gang { --category-color:#8b1a1a; }
.cat-Law-Enforcement { --category-color:#2e4a7a; }

@media(max-width:600px) {
  .entries-grid { grid-template-columns:1fr; }
  .modal-title { font-size:1.35rem; }
  .nav-tab { padding:6px 10px; font-size:.7rem; }
}

/* ── CHARACTER SUB-FILTERS ── */
.char-filters-bar {
  background:#1e1408; border-bottom:1px solid rgba(139,105,20,.25); padding:7px 24px;
  display:none; overflow-x:auto; scrollbar-width:none;
}
.char-filters-bar::-webkit-scrollbar { display:none; }
.char-filters-bar.visible { display:block; }
.char-filters-inner { max-width:1400px; margin:0 auto; display:flex; gap:18px; align-items:center; flex-wrap:wrap; min-width:max-content; }
.char-filter-group { display:flex; gap:5px; align-items:center; }
.char-filter-group-label { font-family:'Crimson Text',serif; color:var(--sepia); font-size:.72rem; text-transform:uppercase; letter-spacing:.12em; white-space:nowrap; margin-right:2px; padding-right:6px; border-right:1px solid rgba(139,105,20,.3); }
.cf-btn { padding:3px 10px; background:transparent; border:1px solid rgba(139,105,20,.35); border-radius:1px; color:var(--fade); font-family:'Crimson Text',serif; font-size:.75rem; cursor:pointer; transition:all .2s; white-space:nowrap; letter-spacing:.03em; }
.cf-btn:hover { border-color:var(--sepia-light); color:var(--sepia-light); }
.cf-btn.active { background:rgba(139,105,20,.35); border-color:var(--sepia-light); color:var(--sepia-light); font-weight:600; }
.cf-divider { width:1px; height:20px; background:rgba(139,105,20,.2); }

</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-title">Colter Territory</span>
      <span class="logo-sub">World Bible — 1867</span>
    </div>
    <div class="divider-v"></div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-view="entries">📖 Entries</button>
      <button class="nav-tab" data-view="map">🗺 Map</button>
    </div>
    <div class="divider-v"></div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Search persons, places, lore…" autocomplete="off" spellcheck="false">
    </div>
    <div class="result-count" id="result-count"></div>
  </div>
</header>

<!-- Category filter bar (entries view only) -->
<div class="filters" id="filters-bar">
  <div class="filters-inner" id="filters-inner">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" data-cat="All">All</button>
  </div>
</div>


<div class="char-filters-bar" id="char-filters-bar">
  <div class="char-filters-inner">
    <div class="char-filter-group">
      <span class="char-filter-group-label">Gender</span>
      <button class="cf-btn active" data-cf-gender="all">All</button>
      <button class="cf-btn" data-cf-gender="male">&#9794; Male</button>
      <button class="cf-btn" data-cf-gender="female">&#9792; Female</button>
      <button class="cf-btn" data-cf-gender="group">Group / Mixed</button>
    </div>
    <div class="cf-divider"></div>
    <div class="char-filter-group">
      <span class="char-filter-group-label">Standing</span>
      <button class="cf-btn active" data-cf-align="all">All</button>
      <button class="cf-btn" data-cf-align="outlaw">&#9679; Outlaw</button>
      <button class="cf-btn" data-cf-align="lawman">&#11088; Lawman</button>
      <button class="cf-btn" data-cf-align="civilian">&#9675; Civilian</button>
      <button class="cf-btn" data-cf-align="neutral">&#9878; Drifter</button>
      <button class="cf-btn" data-cf-align="indigenous">&#10022; Indigenous</button>
    </div>
    <div class="cf-divider"></div>
    <div class="char-filter-group">
      <span class="char-filter-group-label">Sort</span>
      <button class="cf-btn active" data-cf-sort="default">Default</button>
      <button class="cf-btn" data-cf-sort="az">A &#8594; Z</button>
      <button class="cf-btn" data-cf-sort="za">Z &#8594; A</button>
      <button class="cf-btn" data-cf-sort="youngest">Youngest First</button>
      <button class="cf-btn" data-cf-sort="oldest">Oldest First</button>
    </div>
  </div>
</div>

<!-- ── ENTRIES VIEW ── -->
<div class="view active" id="view-entries">
  <div class="main">
    <div class="ornament">✦ ✦ ✦</div>
    <div class="entries-grid" id="grid"></div>
  </div>
</div>

<!-- ── MAP VIEW ── -->
<div class="view" id="view-map">
  <div class="map-view">
    <div class="map-controls">
      <div class="map-controls-left">
        <div>
          <div class="map-title">Map of Colter Territory, 1867</div>
          <div class="map-subtitle">A Bureau of Investigation Archive — Compiled by Archivist Edmund Crale</div>
        </div>
      </div>
      <div class="toggle-wrap">
        <span class="toggle-label">Interactive</span>
        <label class="toggle">
          <input type="checkbox" id="map-interactive-toggle" checked>
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
